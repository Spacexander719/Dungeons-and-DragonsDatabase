<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns="http://www.w3.org/1999/html" xmlns="http://www.w3.org/1999/html"
      lang="">
<head>
    <title>Edit Character</title>
</head>
<body>

<h1>Edit Character</h1>

<form th:action="@{/characters/edit}" th:object="${character}" method="post">

    <input type="hidden" th:field="*{charID}" />

    <label>Name:</label>
    <label>
        <input type="text" th:field="*{charName}" required />
    </label>

    <label>Level:</label>
    <label>
        <input type="number" th:field="*{charLevel}" min="1" max="20" required />
    </label>

    <br>
    <br>


    <label>STR:</label>
    <label>
        <input type="number" th:field="*{STR}" required />
    </label>

    <label>DEX:</label>
    <label>
        <input type="number" th:field="*{DEX}" required />
    </label>

    <label>CON:</label>
    <label>
        <input type="number" th:field="*{CON}" required />
    </label>

    <label>INT:</label>
    <label>
        <input type="number" th:field="*{INTEL}" required />
    </label>

    <label>WIS:</label>
    <label>
        <input type="number" th:field="*{WIS}" required />
    </label>

    <label>CHA:</label>
    <label>
        <input type="number" th:field="*{CHA}" required />
    </label>
    
    <br>
    <br>

    <label>Max HP:</label>
    <label>
        <input type="number" th:field="*{maxHP}" required />
    </label>

    <label>Class:</label>
    <label>
        <select th:field="*{classes}" multiple size="5">
            <option th:each="c : ${classes}"
                    th:value="${c}"
                    th:text="${c.className}">
            </option>
        </select>
    </label>

    <label>Species:</label>
    <label>
        <select th:field="*{species}">
            <option th:each="s : ${species}"
                    th:value="${s}"
                    th:text="${s.speciesName}">
            </option>
        </select>
    </label>

    <label>Feats:</label>
    <label>
        <select th:field="*{feats}" multiple size="5">
            <option th:each="f : ${feats}"
                    th:value="${f}"
                    th:text="${f.featName}">
            </option>
        </select>
    </label>

    <label>Background:</label>
    <label>
        <select th:field="*{background}">
            <option th:each="b : ${backgrounds}"
                    th:value="${b}"
                    th:text="${b.backgroundName}">
            </option>
        </select>
    </label>

    <label>Weapons:</label>
    <label>
        <select th:field="*{weapons}" multiple size="5">
            <option th:each="w : ${weapons}"
                    th:value="${w}"
                    th:text="${w.weaponName}">
            </option>
        </select>
    </label>


    <button type="submit">Save Changes</button>
</form>

<a href="/characters/list">Back to List</a>

</body>
</html>
